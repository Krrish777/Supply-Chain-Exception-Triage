name: security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Weekly full-history rescan — catches secrets merged under prior ruleset versions.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so scheduled rescans see every commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
