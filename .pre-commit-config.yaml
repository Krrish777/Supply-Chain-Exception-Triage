# Hook order: fast hygiene → lint (ruff) → format (ruff-format) → type (mypy) → security (gitleaks).
# Lint runs before format because ruff --fix can change formatting.
# Rules live in `.claude/rules/` and `pyproject.toml`; this file enforces at commit time.

default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
